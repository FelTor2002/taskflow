<section class="task-filters">
  <label class="search">
    <span>{{ i18n.t('search') }}</span>
    <input
      type="search"
      [ngModel]="state().search"
      (ngModelChange)="onSearchChange($event)"
      [placeholder]="i18n.t('searchPlaceholder')"
    />
  </label>

  <label>
    <span>{{ i18n.t('status') }}</span>
    <select [ngModel]="state().status" (ngModelChange)="onStatusChange($event)">
      <option value="all">{{ i18n.t('all') }}</option>
      <option value="pending">{{ statusLabel('pending') }}</option>
      <option value="in-progress">{{ statusLabel('in-progress') }}</option>
      <option value="completed">{{ statusLabel('completed') }}</option>
    </select>
  </label>

  <label>
    <span>{{ i18n.t('priority') }}</span>
    <select [ngModel]="state().priority" (ngModelChange)="onPriorityChange($event)">
      <option value="all">{{ i18n.t('all') }}</option>
      <option value="low">{{ priorityLabel('low') }}</option>
      <option value="medium">{{ priorityLabel('medium') }}</option>
      <option value="high">{{ priorityLabel('high') }}</option>
    </select>
  </label>

  <label>
    <span>{{ i18n.t('sortBy') }}</span>
    <select [ngModel]="state().sort" (ngModelChange)="onSortChange($event)">
      <option value="createdAt-desc">{{ i18n.t('sortCreatedDesc') }}</option>
      <option value="createdAt-asc">{{ i18n.t('sortCreatedAsc') }}</option>
      <option value="dueDate-asc">{{ i18n.t('sortDueAsc') }}</option>
      <option value="dueDate-desc">{{ i18n.t('sortDueDesc') }}</option>
    </select>
  </label>

  <button type="button" (click)="resetFilters()">{{ i18n.t('clearFilters') }}</button>
</section>
