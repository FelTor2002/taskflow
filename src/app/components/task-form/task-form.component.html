<form class="task-form" [formGroup]="form" (ngSubmit)="submit()">
  <div class="form-grid">
    <label>
      <span>{{ i18n.t('title') }}</span>
      <input formControlName="title" type="text" [placeholder]="i18n.t('titlePlaceholder')" />
    </label>

    <label>
      <span>{{ i18n.t('description') }}</span>
      <textarea
        formControlName="description"
        rows="3"
        [placeholder]="i18n.t('descriptionPlaceholder')"
      ></textarea>
    </label>

    <label>
      <span>{{ i18n.t('status') }}</span>
      <select formControlName="status">
        @for (status of statuses; track status) {
          <option [value]="status">{{ statusLabel(status) }}</option>
        }
      </select>
    </label>

    <label>
      <span>{{ i18n.t('priority') }}</span>
      <select formControlName="priority">
        @for (priority of priorities; track priority) {
          <option [value]="priority">{{ priorityLabel(priority) }}</option>
        }
      </select>
    </label>

    <label>
      <span>{{ i18n.t('dueDate') }}</span>
      <input formControlName="dueDate" type="date" />
    </label>
  </div>

  <div class="actions">
    <button class="ghost" type="button" (click)="cancel.emit()">{{ i18n.t('cancel') }}</button>
    <button class="primary" type="submit">
      {{ task() ? i18n.t('updateTask') : i18n.t('createAction') }}
    </button>
  </div>
</form>
