<form class="task-form" [formGroup]="form" (ngSubmit)="submit()">
  <div class="form-grid">
    <label>
      <span>{{ i18n.t('title') }} *</span>
      <input
        formControlName="title"
        type="text"
        [placeholder]="i18n.t('titlePlaceholder')"
        [class.invalid]="isInvalid('title')"
      />
      <small class="hint">{{ i18n.t('validationTitleHint') }} {{ titleLength() }}/80</small>
      @if (isInvalid('title')) {
        <small class="error">{{ errorMessage('title') }}</small>
      }
    </label>

    <label>
      <span>{{ i18n.t('description') }} *</span>
      <textarea
        formControlName="description"
        rows="3"
        [placeholder]="i18n.t('descriptionPlaceholder')"
        [class.invalid]="isInvalid('description')"
      ></textarea>
      <small class="hint">{{ i18n.t('validationDescriptionHint') }} {{ descriptionLength() }}/300</small>
      @if (isInvalid('description')) {
        <small class="error">{{ errorMessage('description') }}</small>
      }
    </label>

    <label>
      <span>{{ i18n.t('status') }}</span>
      <select formControlName="status">
        @for (status of statuses; track status) {
          <option [value]="status">{{ statusLabel(status) }}</option>
        }
      </select>
    </label>

    <label>
      <span>{{ i18n.t('priority') }}</span>
      <select formControlName="priority">
        @for (priority of priorities; track priority) {
          <option [value]="priority">{{ priorityLabel(priority) }}</option>
        }
      </select>
    </label>

    <label>
      <span>{{ i18n.t('dueDate') }} *</span>
      <input formControlName="dueDate" type="date" [class.invalid]="isInvalid('dueDate')" />
      <small class="hint">{{ i18n.t('validationDueDateHint') }}</small>
      @if (isInvalid('dueDate')) {
        <small class="error">{{ errorMessage('dueDate') }}</small>
      }
    </label>
  </div>

  <div class="actions">
    <button class="ghost" type="button" (click)="cancel.emit()">{{ i18n.t('cancel') }}</button>
    <button class="primary" type="submit">
      {{ task() ? i18n.t('updateTask') : i18n.t('createAction') }}
    </button>
  </div>
</form>
