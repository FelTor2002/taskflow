<article class="task-card" [class.completed]="task().status === 'completed'">
  <header>
    <h3>{{ task().title }}</h3>
    <span class="priority" [class]="'priority ' + task().priority">
      {{ priorityLabel(task().priority) }}
    </span>
  </header>

  <p>{{ task().description }}</p>

  <div class="meta">
    <span>{{ i18n.t('status') }}: {{ statusLabel(task().status) }}</span>
    <span>{{ i18n.t('dueDate') }}: {{ task().dueDate | date: 'MMM d, y' }}</span>
    <span>{{ i18n.t('createdAt') }}: {{ task().createdAt | date: 'MMM d, y' }}</span>
  </div>

  <footer>
    <button type="button" (click)="toggleCompleted.emit(task().id)">
      {{ task().status === 'completed' ? i18n.t('reopen') : i18n.t('complete') }}
    </button>
    <button type="button" (click)="edit.emit(task().id)">{{ i18n.t('editTask') }}</button>
    <button class="danger" type="button" (click)="remove.emit(task().id)">{{ i18n.t('delete') }}</button>
  </footer>
</article>
